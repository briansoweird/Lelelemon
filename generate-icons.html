<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lelelemon — Icon Generator</title>
  <style>
    body { font-family: monospace; background: #FFFEF0; color: #1A1A00; padding: 32px; }
    h1 { font-family: sans-serif; font-weight: 800; margin-bottom: 4px; }
    p  { color: #7A7A40; margin-bottom: 24px; font-size: 13px; }
    .grid { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
    .icon-box { text-align: center; }
    .icon-box canvas { display: block; border: 2px solid #E8E580; border-radius: 16px; }
    .icon-box span { font-size: 11px; color: #7A7A40; display: block; margin-top: 4px; }
    button { background: #1A1A00; color: #F5E642; font-family: monospace; font-weight: 700;
             font-size: 14px; border: none; border-radius: 10px; padding: 12px 28px;
             cursor: pointer; transition: all 0.15s; }
    button:hover { background: #2a2a00; }
    .done { background: #22C55E; color: #fff; padding: 12px 20px; border-radius: 10px;
            font-size: 13px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <h1>🍋 Lelelemon Icon Generator</h1>
  <p>Click the button below to generate and download all 8 required PWA icons.<br>
     Put the downloaded files into an <strong>icons/</strong> folder next to your index.html.</p>

  <div class="grid" id="grid"></div>
  <button onclick="downloadAll()">⬇ Download All Icons</button>
  <div class="done" id="done">✅ All icons downloaded! Move them into your <code>icons/</code> folder.</div>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const r = size * 0.12;

      // Background
      ctx.fillStyle = '#F5E642';
      roundRect(ctx, 0, 0, size, size, r);
      ctx.fill();

      // Inner circle
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.38, 0, Math.PI * 2);
      ctx.fill();

      // Emoji
      ctx.font = `${size * 0.52}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍋', size / 2, size / 2 + size * 0.03);

      // App name (only on larger icons)
      if (size >= 128) {
        ctx.fillStyle = 'rgba(26,26,0,0.55)';
        ctx.font = `bold ${size * 0.09}px 'Arial', sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('LELELEMON', size / 2, size - size * 0.06);
      }

      return canvas;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Render previews
    const grid = document.getElementById('grid');
    SIZES.forEach(size => {
      const canvas = drawIcon(size);
      const preview = document.createElement('canvas');
      const previewSize = Math.min(size, 96);
      preview.width  = previewSize;
      preview.height = previewSize;
      preview.getContext('2d').drawImage(canvas, 0, 0, previewSize, previewSize);

      const box = document.createElement('div');
      box.className = 'icon-box';
      box.appendChild(preview);
      box.innerHTML += `<span>${size}×${size}</span>`;
      grid.appendChild(box);
    });

    function downloadAll() {
      SIZES.forEach((size, i) => {
        setTimeout(() => {
          const canvas = drawIcon(size);
          const link   = document.createElement('a');
          link.download = `icon-${size}.png`;
          link.href     = canvas.toDataURL('image/png');
          link.click();
        }, i * 200);
      });
      setTimeout(() => {
        document.getElementById('done').style.display = 'block';
      }, SIZES.length * 200 + 500);
    }
  </script>
</body>
</html>
